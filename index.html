<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Therapeutic Companion</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0e0e;
        --surface: #1a1a1a;
        --surface2: #222222;
        --border: #2e2e2e;
        --text: #e8e8e8;
        --text-muted: #777;
        --accent: #e8587a;
        --accent-glow: rgba(232, 88, 122, 0.18);
        --radius: 10px;
        --font-body: "DM Sans", sans-serif;
        --font-display: "DM Serif Display", serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px 80px;
      }

      .container {
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      /* Header */
      .header {
        margin-bottom: 24px;
      }
      .header h1 {
        font-family: var(--font-display);
        font-size: 1.6rem;
        font-weight: 400;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
      }
      .header h1 .brain-icon {
        font-size: 1.4rem;
      }
      .header .subtitle {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 4px;
        font-weight: 400;
      }
      .header .hint {
        font-size: 0.74rem;
        color: #555;
        margin-top: 2px;
      }

      /* Chat window */
      .chat-window {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-height: 320px;
        max-height: 420px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scrollbar-width: thin;
        scrollbar-color: #333 transparent;
      }
      .chat-window::-webkit-scrollbar {
        width: 4px;
      }
      .chat-window::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }

      .chat-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3a3a3a;
        font-size: 0.82rem;
        font-style: italic;
        user-select: none;
      }

      /* Message bubbles */
      .msg {
        display: flex;
        flex-direction: column;
        max-width: 75%;
        animation: fadeUp 0.25s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.ai {
        align-self: flex-start;
        align-items: flex-start;
      }
      .msg .bubble {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.88rem;
        line-height: 1.55;
      }
      .msg.user .bubble {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.ai .bubble {
        background: var(--surface2);
        color: var(--text);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }
      .msg .label {
        font-size: 0.68rem;
        color: var(--text-muted);
        margin-bottom: 4px;
        letter-spacing: 0.04em;
      }

      /* Emotion pill */
      .emotion-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.68rem;
        padding: 2px 8px;
        border-radius: 99px;
        margin-top: 4px;
        font-weight: 500;
        letter-spacing: 0.03em;
      }
      .emotion-anxious {
        background: rgba(255, 183, 77, 0.15);
        color: #ffb74d;
      }
      .emotion-sad {
        background: rgba(100, 149, 237, 0.15);
        color: #6495ed;
      }
      .emotion-happy {
        background: rgba(102, 204, 102, 0.15);
        color: #66cc66;
      }
      .emotion-calm {
        background: rgba(147, 112, 219, 0.15);
        color: #9370db;
      }
      .emotion-stressed {
        background: rgba(255, 99, 99, 0.15);
        color: #ff6363;
      }
      .emotion-neutral {
        background: rgba(150, 150, 150, 0.12);
        color: #aaa;
      }

      /* Typing indicator */
      .typing-indicator {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        align-self: flex-start;
      }
      .typing-indicator span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #555;
        animation: bounce 1.2s infinite;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-5px);
        }
      }

      /* Divider between sections */
      .section-gap {
        height: 10px;
      }

      /* Toggle row */
      .toggle-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }
      .toggle-row label {
        font-size: 0.82rem;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Custom checkbox toggle */
      .toggle-checkbox {
        display: none;
      }
      .toggle-switch {
        width: 34px;
        height: 18px;
        background: #333;
        border-radius: 99px;
        position: relative;
        cursor: pointer;
        transition: background 0.25s;
        flex-shrink: 0;
      }
      .toggle-switch::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        background: #888;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition:
          transform 0.25s,
          background 0.25s;
      }
      .toggle-checkbox:checked + .toggle-switch {
        background: var(--accent-glow);
      }
      .toggle-checkbox:checked + .toggle-switch::after {
        transform: translateX(16px);
        background: var(--accent);
      }

      /* Voice output panel */
      .voice-output-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-top: 10px;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.74rem;
        color: var(--text-muted);
        background: var(--surface2);
      }
      .panel-header .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
      }
      .voice-player {
        padding: 18px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 72px;
        gap: 14px;
      }
      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        opacity: 0.3;
      }
      .waveform.active {
        opacity: 1;
      }
      .waveform-bar {
        width: 3px;
        background: var(--accent);
        border-radius: 2px;
        animation: wave 1s ease-in-out infinite;
      }
      .waveform-bar:nth-child(1) {
        height: 10px;
        animation-delay: 0s;
      }
      .waveform-bar:nth-child(2) {
        height: 20px;
        animation-delay: 0.1s;
      }
      .waveform-bar:nth-child(3) {
        height: 14px;
        animation-delay: 0.2s;
      }
      .waveform-bar:nth-child(4) {
        height: 24px;
        animation-delay: 0.15s;
      }
      .waveform-bar:nth-child(5) {
        height: 18px;
        animation-delay: 0.05s;
      }
      .waveform-bar:nth-child(6) {
        height: 12px;
        animation-delay: 0.25s;
      }
      .waveform-bar:nth-child(7) {
        height: 22px;
        animation-delay: 0.1s;
      }
      .waveform-bar:nth-child(8) {
        height: 8px;
        animation-delay: 0.3s;
      }
      @keyframes wave {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.4);
        }
      }
      .voice-idle-icon {
        color: #3a3a3a;
        font-size: 1.4rem;
      }

      /* Text input row */
      .input-row {
        display: flex;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-top: 10px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .input-row:focus-within {
        border-color: #3d3d3d;
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .input-row input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.86rem;
        padding: 14px 16px;
        caret-color: var(--accent);
      }
      .input-row input::placeholder {
        color: #454545;
      }
      .send-btn {
        width: 38px;
        height: 38px;
        margin-right: 6px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        transition:
          background 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }
      .send-btn:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* Speak / record panel */
      .speak-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-top: 10px;
        overflow: hidden;
      }
      .speak-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
      }
      .speak-header-left {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.74rem;
        color: var(--text-muted);
      }
      .speak-close {
        width: 18px;
        height: 18px;
        background: #2e2e2e;
        border: none;
        border-radius: 4px;
        color: #666;
        font-size: 0.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .speak-close:hover {
        background: #3a3a3a;
        color: #aaa;
      }

      .speak-body {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .record-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 500;
        padding: 8px 14px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .record-btn:hover {
        background: #2a2a2a;
      }
      .record-btn.recording {
        border-color: var(--accent);
      }
      .record-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e05a30;
        flex-shrink: 0;
      }
      .record-btn.recording .record-dot {
        animation: pulse-dot 0.9s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.75);
        }
      }

      .mic-select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text-muted);
        font-family: var(--font-body);
        font-size: 0.78rem;
        padding: 8px 12px;
        cursor: pointer;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        min-width: 140px;
        text-overflow: ellipsis;
      }
      .mic-select:focus {
        border-color: #3d3d3d;
      }

      /* Send voice button */
      .send-voice-btn {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius) var(--radius);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.86rem;
        font-weight: 500;
        padding: 14px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        letter-spacing: 0.02em;
      }
      .send-voice-btn:hover {
        background: #262626;
        color: var(--accent);
      }
      .send-voice-btn:active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* Recording timer */
      .rec-timer {
        font-size: 0.74rem;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
        min-width: 38px;
        text-align: center;
        display: none;
      }
      .rec-timer.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1><span class="brain-icon">🧠</span> Therapeutic Companion</h1>
        <div class="subtitle">Emotion-aware AI assistant</div>
        <div class="hint">Speak or type how you feel.</div>
      </div>

      <!-- Chat Window -->
      <div class="chat-window" id="chatWindow">
        <div class="chat-empty" id="chatEmpty">
          Your conversation will appear here…
        </div>
      </div>

      <!-- Voice Output Toggle -->
      <div class="toggle-row">
        <label>
          <input
            type="checkbox"
            class="toggle-checkbox"
            id="voiceToggle"
            onchange="toggleVoicePanel()"
          />
          <span class="toggle-switch"></span>
          Enable AI Voice Output
        </label>
      </div>

      <!-- AI Voice Output Panel -->
      <div class="voice-output-panel" id="voiceOutputPanel">
        <div class="panel-header">
          <span>♫</span>
          <span>AI Voice Output</span>
        </div>
        <div class="voice-player" id="voicePlayer">
          <div class="voice-idle-icon" id="voiceIdleIcon">♫</div>
          <div class="waveform" id="waveform" style="display: none">
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
          </div>
        </div>
      </div>

      <!-- Text Input -->
      <div class="input-row">
        <input
          type="text"
          id="textInput"
          placeholder="Type what you are feeling…"
          onkeydown="handleKeydown(event)"
        />
        <button class="send-btn" title="Send" onclick="sendTextMessage()">
          ➤
        </button>
      </div>

      <!-- Speak Panel -->
      <div class="speak-panel" id="speakPanel">
        <div class="speak-header">
          <div class="speak-header-left">
            <span>♫</span>
            <span>Speak</span>
          </div>
          <button class="speak-close" onclick="closeSpeakPanel()" title="Close">
            ✕
          </button>
        </div>
        <div class="speak-body">
          <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
            <span class="record-dot" id="recordDot"></span>
            <span id="recordLabel">Record</span>
          </button>
          <span class="rec-timer" id="recTimer">0:00</span>
          <select class="mic-select" id="micSelect">
            <option>Default - Microphone</option>
          </select>
        </div>
        <button class="send-voice-btn" onclick="sendVoiceMessage()">
          Send Voice
        </button>
      </div>
    </div>

    <script>
      // --- State ---
      let isRecording = false;
      let recInterval = null;
      let recSeconds = 0;
      let mediaRecorder = null;
      let audioChunks = [];
      let voiceEnabled = false;
      let pendingVoiceBlob = null;

      // --- Populate microphones ---
      async function populateMics() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const mics = devices.filter((d) => d.kind === "audioinput");
          const sel = document.getElementById("micSelect");
          sel.innerHTML = "";
          mics.forEach((m, i) => {
            const opt = document.createElement("option");
            opt.value = m.deviceId;
            opt.textContent = m.label || `Microphone ${i + 1}`;
            sel.appendChild(opt);
          });
          if (mics.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "Default - Microphone";
            sel.appendChild(opt);
          }
        } catch (e) {
          console.warn("Could not enumerate devices", e);
        }
      }
      populateMics();

      // --- Toggle voice panel ---
      function toggleVoicePanel() {
        voiceEnabled = document.getElementById("voiceToggle").checked;
      }

      // --- Close speak panel ---
      function closeSpeakPanel() {
        document.getElementById("speakPanel").style.display = "none";
        stopRecording();
      }

      // --- Record toggle ---
      async function toggleRecord() {
        if (!isRecording) {
          await startRecording();
        } else {
          stopRecording();
        }
      }

      async function startRecording() {
        try {
          const deviceId = document.getElementById("micSelect").value;
          const constraints =
            deviceId && deviceId !== "default"
              ? { audio: { deviceId: { exact: deviceId } } }
              : { audio: true };
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onstop = () => {
            pendingVoiceBlob = new Blob(audioChunks, { type: "audio/webm" });
            stream.getTracks().forEach((t) => t.stop());
          };
          mediaRecorder.start();
          isRecording = true;
          recSeconds = 0;
          const btn = document.getElementById("recordBtn");
          btn.classList.add("recording");
          document.getElementById("recordLabel").textContent = "Stop";
          const timerEl = document.getElementById("recTimer");
          timerEl.classList.add("visible");
          recInterval = setInterval(() => {
            recSeconds++;
            const m = Math.floor(recSeconds / 60);
            const s = String(recSeconds % 60).padStart(2, "0");
            timerEl.textContent = `${m}:${s}`;
          }, 1000);
        } catch (e) {
          alert("Microphone access denied or not available.");
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        isRecording = false;
        clearInterval(recInterval);
        recInterval = null;
        document.getElementById("recordBtn").classList.remove("recording");
        document.getElementById("recordLabel").textContent = "Record";
        document.getElementById("recTimer").classList.remove("visible");
        document.getElementById("recTimer").textContent = "0:00";
      }

      // --- Send voice message ---
      async function sendVoiceMessage() {
        if (!pendingVoiceBlob) {
          addMessage(
            "user",
            "🎤 [Voice message — no recording found. Please record first.]",
          );
          return;
        }
        addMessage("user", "🎤 Voice message sent");
        pendingVoiceBlob = null;
        await getAIResponse(
          "[Voice message from user. Respond empathetically as a therapeutic AI companion.]",
        );
      }

      // --- Send text message ---
      async function sendTextMessage() {
        const input = document.getElementById("textInput");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        addMessage("user", text);
        await getAIResponse(text);
      }

      function handleKeydown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendTextMessage();
        }
      }

      // --- Add message bubble ---
      function addMessage(role, text, emotion) {
        const chatWindow = document.getElementById("chatWindow");
        const empty = document.getElementById("chatEmpty");
        if (empty) empty.remove();

        const wrap = document.createElement("div");
        wrap.className = `msg ${role}`;

        const labelEl = document.createElement("div");
        labelEl.className = "label";
        labelEl.textContent = role === "user" ? "You" : "Companion";
        wrap.appendChild(labelEl);

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        wrap.appendChild(bubble);

        if (emotion) {
          const tag = document.createElement("span");
          tag.className = `emotion-tag emotion-${emotion.toLowerCase()}`;
          tag.textContent = `● ${emotion}`;
          wrap.appendChild(tag);
        }

        chatWindow.appendChild(wrap);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return wrap;
      }

      // --- Typing indicator ---
      function showTyping() {
        const chatWindow = document.getElementById("chatWindow");
        const empty = document.getElementById("chatEmpty");
        if (empty) empty.remove();

        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.id = "typingIndicator";
        indicator.innerHTML = "<span></span><span></span><span></span>";
        chatWindow.appendChild(indicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function removeTyping() {
        const t = document.getElementById("typingIndicator");
        if (t) t.remove();
      }

      // --- AI response via Anthropic API ---
      const SYSTEM_PROMPT = `You are a warm, emotionally intelligent therapeutic companion AI. Your role is to listen empathetically, validate feelings, provide gentle reflections, and offer supportive guidance.
 
Always respond in a compassionate, non-judgmental tone. Keep responses concise (2-4 sentences max).
 
At the end of each response, on a new line, output EXACTLY this format:
EMOTION: <one word from: anxious, sad, happy, calm, stressed, neutral>
 
Do not use markdown formatting.`;

      async function getAIResponse(userText) {
        showTyping();
        try {
          const response = await fetch(
            "https://api.anthropic.com/v1/messages",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: SYSTEM_PROMPT,
                messages: [{ role: "user", content: userText }],
              }),
            },
          );
          const data = await response.json();
          removeTyping();

          const fullText = (data.content || [])
            .map((b) => b.text || "")
            .join("");
          const emotionMatch = fullText.match(/EMOTION:\s*(\w+)/i);
          const emotion = emotionMatch ? emotionMatch[1] : "neutral";
          const cleanText = fullText.replace(/\nEMOTION:.*$/i, "").trim();

          addMessage(
            "ai",
            cleanText,
            emotion.charAt(0).toUpperCase() + emotion.slice(1).toLowerCase(),
          );

          // Voice output
          if (voiceEnabled && "speechSynthesis" in window) {
            playVoice(cleanText);
          }
        } catch (err) {
          removeTyping();
          addMessage(
            "ai",
            "I'm here for you. It seems there was a connection issue — please try again in a moment.",
          );
        }
      }

      // --- TTS via browser Speech Synthesis ---
      function playVoice(text) {
        window.speechSynthesis.cancel();
        const waveform = document.getElementById("waveform");
        const idleIcon = document.getElementById("voiceIdleIcon");
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.92;
        utterance.pitch = 1.0;

        // Pick a nice voice if available
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(
          (v) =>
            v.name.toLowerCase().includes("samantha") ||
            v.name.toLowerCase().includes("karen") ||
            v.name.toLowerCase().includes("female") ||
            v.lang === "en-US",
        );
        if (preferred) utterance.voice = preferred;

        utterance.onstart = () => {
          idleIcon.style.display = "none";
          waveform.style.display = "flex";
          waveform.classList.add("active");
        };
        utterance.onend = utterance.onerror = () => {
          idleIcon.style.display = "block";
          waveform.style.display = "none";
          waveform.classList.remove("active");
        };
        window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
